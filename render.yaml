services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: asla-council-api
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000

  # ── Frontend Static Site ─────────────────────────────────────
  - type: web
    name: asla-council-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
